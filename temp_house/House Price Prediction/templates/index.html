<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Price Prediction</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="number"],
        input[type="text"],
        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input[type="number"]:focus,
        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input[type="number"]::placeholder {
            color: #bbb;
        }

        select {
            cursor: pointer;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            padding: 13px 30px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-predict {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            grid-column: 1 / -1;
        }

        .btn-predict:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .btn-predict:active {
            transform: translateY(0);
        }

        .btn-reset {
            background: #f0f0f0;
            color: #333;
        }

        .btn-reset:hover {
            background: #e0e0e0;
        }

        .result-box {
            margin-top: 30px;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }

        .result-box.success {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            border: 2px solid #27ae60;
            display: block;
        }

        .result-box.error {
            background: linear-gradient(135deg, #fa7c92 0%, #fee140 100%);
            border: 2px solid #e74c3c;
            display: block;
        }

        .result-label {
            color: #333;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .result-price {
            font-size: 36px;
            font-weight: bold;
            color: #27ae60;
        }

        .result-box.error .result-price {
            color: #e74c3c;
            font-size: 16px;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #666;
            margin-top: 10px;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            .header h1 {
                font-size: 22px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .button-group {
                grid-template-columns: 1fr;
            }

            .result-price {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏠 House Price Prediction</h1>
            <p>Enter house details to get an AI-powered price prediction</p>
        </div>

        <form id="predictionForm">
            <!-- Row 1: Area and Year Built -->
            <div class="form-row">
                <div class="form-group">
                    <label for="area">Area (sq ft)</label>
                    <input 
                        type="number" 
                        id="area" 
                        name="area" 
                        placeholder="e.g., 2500" 
                        required 
                        min="100"
                        max="10000"
                    >
                </div>
                <div class="form-group">
                    <label for="yearBuilt">Year Built</label>
                    <input 
                        type="number" 
                        id="yearBuilt" 
                        name="yearBuilt" 
                        placeholder="e.g., 2000" 
                        required 
                        min="1800"
                        max="2024"
                    >
                </div>
            </div>

            <!-- Row 2: Bedrooms and Bathrooms -->
            <div class="form-row">
                <div class="form-group">
                    <label for="bedrooms">Bedrooms</label>
                    <input 
                        type="number" 
                        id="bedrooms" 
                        name="bedrooms" 
                        placeholder="e.g., 3" 
                        required 
                        min="1"
                        max="10"
                    >
                </div>
                <div class="form-group">
                    <label for="bathrooms">Bathrooms</label>
                    <input 
                        type="number" 
                        id="bathrooms" 
                        name="bathrooms" 
                        placeholder="e.g., 2" 
                        required 
                        min="1"
                        max="10"
                        step="0.5"
                    >
                </div>
            </div>

            <!-- Row 3: Floors and Location -->
            <div class="form-row">
                <div class="form-group">
                    <label for="floors">Floors</label>
                    <input 
                        type="number" 
                        id="floors" 
                        name="floors" 
                        placeholder="e.g., 2" 
                        required 
                        min="1"
                        max="5"
                    >
                </div>
                <div class="form-group">
                    <label for="location">Location</label>
                    <select id="location" name="location" required>
                        <option value="">Select location...</option>
                        <option value="Downtown">Downtown</option>
                        <option value="Urban">Urban</option>
                        <option value="Suburban">Suburban</option>
                        <option value="Rural">Rural</option>
                    </select>
                </div>
            </div>

            <!-- Row 4: Condition and Garage -->
            <div class="form-row">
                <div class="form-group">
                    <label for="condition">Condition</label>
                    <select id="condition" name="condition" required>
                        <option value="">Select condition...</option>
                        <option value="Excellent">Excellent</option>
                        <option value="Good">Good</option>
                        <option value="Fair">Fair</option>
                        <option value="Poor">Poor</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="garage">Garage</label>
                    <select id="garage" name="garage" required>
                        <option value="">Select garage...</option>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>
            </div>

            <!-- Buttons -->
            <div class="button-group">
                <button type="button" class="btn-reset" onclick="resetForm()">
                    Reset Form
                </button>
                <button type="submit" class="btn-predict" id="predictBtn">
                    Predict Price
                </button>
            </div>
        </form>

        <!-- Loading Spinner -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text">Analyzing property data...</div>
        </div>

        <!-- Result Display -->
        <div class="result-box" id="resultBox">
            <div class="result-label" id="resultLabel"></div>
            <div class="result-price" id="resultPrice"></div>
        </div>
    </div>

    <script>
        // Handle form submission
        document.getElementById('predictionForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Show loading spinner
            document.getElementById('loading').style.display = 'block';
            document.getElementById('resultBox').style.display = 'none';
            document.getElementById('predictBtn').disabled = true;
            
            try {
                // Collect form data
                const formData = {
                    area: document.getElementById('area').value,
                    bedrooms: document.getElementById('bedrooms').value,
                    bathrooms: document.getElementById('bathrooms').value,
                    floors: document.getElementById('floors').value,
                    yearBuilt: document.getElementById('yearBuilt').value,
                    location: document.getElementById('location').value,
                    condition: document.getElementById('condition').value,
                    garage: document.getElementById('garage').value
                };
                
                // Send request to backend
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                // Hide loading spinner
                document.getElementById('loading').style.display = 'none';
                
                // Display result
                const resultBox = document.getElementById('resultBox');
                if (response.ok && data.success) {
                    resultBox.className = 'result-box success';
                    document.getElementById('resultLabel').textContent = 'Predicted Price';
                    document.getElementById('resultPrice').textContent = data.formatted_price;
                } else {
                    resultBox.className = 'result-box error';
                    document.getElementById('resultLabel').textContent = 'Error';
                    document.getElementById('resultPrice').textContent = data.error || 'Prediction failed';
                }
                resultBox.style.display = 'block';
                
            } catch (error) {
                // Hide loading spinner
                document.getElementById('loading').style.display = 'none';
                
                // Display error
                const resultBox = document.getElementById('resultBox');
                resultBox.className = 'result-box error';
                document.getElementById('resultLabel').textContent = 'Error';
                document.getElementById('resultPrice').textContent = 'Failed to connect to server';
                resultBox.style.display = 'block';
            } finally {
                document.getElementById('predictBtn').disabled = false;
            }
        });
        
        // Reset form function
        function resetForm() {
            document.getElementById('predictionForm').reset();
            document.getElementById('resultBox').style.display = 'none';
            document.getElementById('loading').style.display = 'none';
        }
        
        // Keyboard shortcut: Enter to submit
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && document.activeElement.tagName !== 'BUTTON') {
                const form = document.getElementById('predictionForm');
                if (form.checkValidity()) {
                    form.dispatchEvent(new Event('submit'));
                }
            }
        });
    </script>
</body>
</html>
